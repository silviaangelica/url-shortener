<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdminPanel — URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --sidebar: #161b27; --sidebar-border: #1e2535;
    --card: #1a1f2e; --card-border: #232a3b; --accent: #3b82f6;
    --accent-hover: #2563eb; --accent-soft: rgba(59,130,246,0.12);
    --green: #22c55e; --red: #ef4444; --red-soft: rgba(239,68,68,0.12);
    --yellow: #f59e0b; --text: #e2e8f0; --text-muted: #64748b;
    --text-dim: #94a3b8; --font: 'Plus Jakarta Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; }
  .sidebar { width: 220px; min-height: 100vh; background: var(--sidebar); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 20px 18px; border-bottom: 1px solid var(--sidebar-border); }
  .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-weight: 700; font-size: 15px; }
  .sidebar-nav { padding: 14px 10px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; color: var(--text-muted); font-weight: 500; font-size: 13.5px; transition: all .18s; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-dim); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
  .topbar { height: 56px; background: var(--sidebar); border-bottom: 1px solid var(--sidebar-border); display: flex; align-items: center; padding: 0 28px; gap: 10px; position: sticky; top: 0; z-index: 50; }
  .topbar-page { color: var(--accent); font-weight: 600; font-size: 13px; }
  .content { padding: 28px; flex: 1; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .page-title { font-size: 24px; font-weight: 700; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--font); font-size: 13.5px; font-weight: 600; transition: all .18s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text-dim); border: 1px solid var(--card-border); }
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px 20px; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .url-list { display: flex; flex-direction: column; gap: 8px; }
  .url-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: all .18s; animation: slideIn .3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .url-card:hover { border-color: var(--accent); }
  .url-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); flex-shrink: 0; }
  .url-info { flex: 1; min-width: 0; }
  .url-short { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 500; cursor: pointer; display: inline-block; }
  .url-short:hover { text-decoration: underline; }
  .url-dest { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
  .url-clicks { font-size: 11px; color: var(--yellow); margin-top: 2px; }
  .url-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .icon-btn { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--card-border); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .icon-btn.copy:hover { background: var(--accent-soft); color: var(--accent); }
  .icon-btn.edit:hover { background: rgba(245,158,11,0.12); color: var(--yellow); }
  .icon-btn.delete:hover { background: var(--red-soft); color: var(--red); }
  .icon-btn svg { width: 14px; height: 14px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 28px; width: 480px; max-width: 95vw; transform: scale(.96); transition: transform .2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-dim); display: block; margin-bottom: 7px; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--card-border); border-radius: 9px; padding: 10px 14px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border .15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-muted); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
  .toast { position: fixed; bottom: 28px; right: 28px; background: #1e2535; border: 1px solid var(--green); border-radius: 10px; padding: 12px 18px; font-size: 13.5px; font-weight: 500; color: var(--green); z-index: 999; display: flex; align-items: center; gap: 8px; transform: translateY(80px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--red); color: var(--red); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🔗</div>
    <span class="logo-text">AdminPanel</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
  </nav>
</aside>

<main class="main">
  <div class="topbar">
    <span style="color:var(--text-muted);font-size:13px">Home /</span>
    <span class="topbar-page">Dashboard</span>
  </div>
  <div class="content">
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add New URL</button>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Total Links</div><div class="stat-value blue" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Active Links</div><div class="stat-value green" id="stat-active">0</div></div>
      <div class="stat-card"><div class="stat-label">Total Clicks</div><div class="stat-value yellow" id="stat-clicks">0</div></div>
    </div>
    <div class="url-list" id="url-list"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="icon">🔗</div>
      <p>Belum ada short link. Buat yang pertama!</p>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add New URL</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 class="modal-title" id="modal-title">Add New URL</h2>
    <div class="form-group">
      <label class="form-label">Destination URL *</label>
      <input type="url" class="form-input" id="input-dest" placeholder="https://example.com/halaman-panjang">
    </div>
    <div class="form-group">
      <label class="form-label">Custom Alias (opsional)</label>
      <input type="text" class="form-input" id="input-alias" placeholder="contoh: promo2026">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveURL()" id="save-btn">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg">Berhasil!</span>
</div>

<script>
const API = 'https://url-shortener-fec6.onrender.com';
let editingAlias = null;

async function loadLinks() {
  try {
    const res = await fetch(`${API}/api/links`);
    const links = await res.json();
    renderLinks(links);
  } catch {
    showToast('Gagal konek ke server!', 'error');
  }
}

function renderLinks(links) {
  const list = document.getElementById('url-list');
  const empty = document.getElementById('empty-state');
  document.getElementById('stat-total').textContent = links.length;
  document.getElementById('stat-active').textContent = links.length;
  document.getElementById('stat-clicks').textContent = links.reduce((s, l) => s + (l.clicks || 0), 0);
  list.innerHTML = '';
  if (links.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  links.forEach(link => {
    const short = `${API}/${link.alias}`;
    const card = document.createElement('div');
    card.className = 'url-card';
    card.innerHTML = `
      <div class="url-indicator"></div>
      <div class="url-info">
        <span class="url-short" onclick="copyURL('${short}')">${short}</span>
        <div class="url-dest">${link.dest}</div>
        <div class="url-clicks">👆 ${link.clicks || 0} klik</div>
      </div>
      <div class="url-actions">
        <button class="icon-btn copy" onclick="copyURL('${short}')" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button class="icon-btn edit" onclick="openEditModal('${link.alias}','${link.dest}')" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn delete" onclick="deleteURL('${link.alias}')" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>`;
    list.appendChild(card);
  });
}

function openAddModal() {
  editingAlias = null;
  document.getElementById('modal-title').textContent = 'Add New URL';
  document.getElementById('save-btn').textContent = 'Simpan';
  document.getElementById('input-dest').value = '';
  document.getElementById('input-alias').value = '';
  document.getElementById('modal').classList.add('open');
}

function openEditModal(alias, dest) {
  editingAlias = alias;
  document.getElementById('modal-title').textContent = 'Edit URL';
  document.getElementById('save-btn').textContent = 'Update';
  document.getElementById('input-dest').value = dest;
  document.getElementById('input-alias').value = alias;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

async function saveURL() {
  const dest = document.getElementById('input-dest').value.trim();
  const alias = document.getElementById('input-alias').value.trim();
  if (!dest) { showToast('URL tujuan wajib diisi!', 'error'); return; }
  try {
    let res;
    if (editingAlias) {
      res = await fetch(`${API}/api/links/${editingAlias}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ dest, newAlias: alias || editingAlias })
      });
    } else {
      res = await fetch(`${API}/api/links`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ dest, alias })
      });
    }
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    closeModal();
    loadLinks();
    showToast(editingAlias ? 'URL berhasil diupdate! ✓' : 'Short link berhasil dibuat! ✓');
  } catch { showToast('Gagal menyimpan!', 'error'); }
}

async function deleteURL(alias) {
  if (!confirm('Hapus short link ini?')) return;
  await fetch(`${API}/api/links/${alias}`, { method: 'DELETE' });
  loadLinks();
  showToast('Link dihapus!', 'error');
}

function copyURL(url) {
  navigator.clipboard.writeText(url).then(() => showToast('Link disalin! 📋'));
}

let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  document.getElementById('toast-icon').textContent = type === 'error' ? '✕' : '✓';
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) saveURL();
});

loadLinks();
</script>
</body>
</html>
